    <!-- Global Styles -->
    <style>
      /* ── Reset & Base ─────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }

      html {
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
      }

      body {
        font-family: "Plus Jakarta Sans", "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #0f172a;
        background-image:
          radial-gradient(ellipse at 20% 30%, rgba(124, 58, 237, 0.14) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 15%, rgba(6, 182, 212, 0.10) 0%, transparent 50%),
          radial-gradient(ellipse at 55% 85%, rgba(244, 63, 94, 0.07) 0%, transparent 45%);
        background-attachment: fixed;
        color: #f1f5f9;
        min-height: 100vh;
      }

      /* Light mode override */
      :not(.dark) body {
        background-color: #f8fafc;
        background-image:
          radial-gradient(ellipse at 20% 30%, rgba(124, 58, 237, 0.06) 0%, transparent 55%),
          radial-gradient(ellipse at 80% 15%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
        color: #0f172a;
      }

      /* ── Scrollbar ────────────────────────────────── */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(124, 58, 237, 0.35);
        border-radius: 9999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(124, 58, 237, 0.6);
      }

      /* ── Glass morphism utility ───────────────────── */
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.10);
      }

      .glass-light {
        background: rgba(255, 255, 255, 0.70);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.50);
      }

      /* ── Glow text ────────────────────────────────── */
      .text-glow-primary {
        text-shadow: 0 0 20px rgba(124, 58, 237, 0.7), 0 0 40px rgba(124, 58, 237, 0.3);
      }

      .text-glow-cyan {
        text-shadow: 0 0 20px rgba(6, 182, 212, 0.7), 0 0 40px rgba(6, 182, 212, 0.3);
      }

      /* ── Gradient border ──────────────────────────── */
      .border-gradient {
        position: relative;
        border-radius: 16px;
      }
      .border-gradient::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, rgba(124,58,237,0.6), rgba(6,182,212,0.4), rgba(244,63,94,0.3));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      /* ── Shimmer animation ────────────────────────── */
      .shimmer-bg {
        background: linear-gradient(
          105deg,
          transparent 40%,
          rgba(255, 255, 255, 0.06) 50%,
          transparent 60%
        );
        background-size: 200% 100%;
        animation: shimmer 2.2s linear infinite;
      }

      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      /* ── Neon underline ───────────────────────────── */
      .neon-underline {
        position: relative;
      }
      .neon-underline::after {
        content: '';
        position: absolute;
        left: 0; bottom: -2px;
        width: 100%; height: 2px;
        background: linear-gradient(90deg, #7c3aed, #06b6d4);
        border-radius: 9999px;
        box-shadow: 0 0 8px rgba(124,58,237,0.6);
      }

      /* ── Focus ring ───────────────────────────────── */
      *:focus-visible {
        outline: 2px solid rgba(124, 58, 237, 0.7);
        outline-offset: 2px;
        border-radius: 6px;
      }

      /* ── Selection ───────────────────────────────── */
      ::selection {
        background: rgba(124, 58, 237, 0.35);
        color: #fff;
      }

      /* ── Transition defaults ──────────────────────── */
      a, button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
